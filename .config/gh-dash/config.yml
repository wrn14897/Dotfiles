prSections:
  - title: Pull Requests
    filters: is:open
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
notificationsSections:
  - title: All
    filters: ""
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60

defaults:
  preview:
    open: false
    width: 0.45
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  notificationsLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  prs:
    - key: "C"
      name: "code review"
      command: >
        tmux new-window -n "{{.RepoName}}-PR-{{.PrNumber}}"
        'wt switch pr:{{.PrNumber}} -x "opencode --prompt review-pr-for-{{.RepoName}}-{{.PrNumber}}"'
    - key: o
      name: view changed files
      command: >
        open "https://github.com/{{.RepoName}}/pull/{{.PrNumber}}/files"
theme:
  colors:
    text:
      primary: "#DCD7BA"
      secondary: "#76946A"
      inverted: "#1F1F28"
      faint: "#727169"
      warning: "#E82424"
      success: "#76946A"
      actor: "#957FB8"
    background:
      selected: "#2D4F67"
    border:
      primary: "#54546D"
      secondary: "#717C7C"
      faint: "#2A2A37"
    inline:
      icons:
        newcontributor: "#98BB6C"
        contributor: "#DCD7BA"
        collaborator: "#E6C384"
        member: "#FFA066"
        owner: "#7E9CD8"
        unknownrole: "#E46876"
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: false
pager:
  diff: "diffnav"
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
